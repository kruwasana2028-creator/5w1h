<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>กิจกรรม 3.1 เทคนิค 5W1H</title>
  <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
  <style>
    body { font-family: 'Sarabun', sans-serif; background-color: #f3f4f6; }
    .shake { animation: shake 0.4s ease-in-out; }
    @keyframes shake {
      0%, 100% { transform: translateX(0); }
      25% { transform: translateX(-6px); }
      75% { transform: translateX(6px); }
    }
  </style>
</head>
<body class="p-4 md:p-8">

  <div class="max-w-3xl mx-auto bg-white rounded-xl shadow-md overflow-hidden p-6">
    <div class="text-center mb-6">
      <h1 class="text-2xl font-bold text-indigo-700">กิจกรรม 3.1 เทคนิค 5W1H</h1>
      <p class="text-gray-600 text-sm mt-1">การตั้งคำถามและวิเคราะห์ข้อมูล (Questioning and Data Analysis)</p>
    </div>

    <div class="bg-amber-50 border-l-4 border-amber-500 p-4 mb-6 rounded-r">
      <div class="flex justify-between items-center mb-1">
        <h3 class="font-bold text-amber-800">📢 สถานการณ์ที่กำหนด (Scenario):</h3>
      </div>
      <p id="scenarioTextContent" class="text-gray-700 text-sm leading-relaxed select-none"> 
        <span id="scenarioTextEn" class="block mt-2 pt-2 border-t border-amber-200 text-gray-500 text-xs italic">
          </span>
      </p>
    </div>

    <form id="activityForm" onsubmit="handleFormSubmit(event)">
      
      <input type="hidden" name="scenario_id" id="scenarioIdInput">

      <div class="bg-gray-50 p-4 rounded-lg border border-gray-200 mb-6 grid grid-cols-2 md:grid-cols-5 gap-4">
        <div class="col-span-2 md:col-span-2">
          <label class="block text-xs font-bold text-gray-700 mb-1">เลขประจำตัวนักเรียน (Student ID)</label>
          <input type="text" name="studentId" required class="w-full border rounded p-2 text-sm bg-white">
        </div>
        <div class="col-span-1 md:col-span-1">
          <label class="block text-xs font-bold text-gray-700 mb-1">คำนำหน้า (Prefix)</label>
          <select name="prefix" required class="w-full border rounded p-2 text-sm bg-white">
            <option value="">เลือก...</option>
            <option value="นาย">นาย</option>
            <option value="นางสาว">นางสาว</option>
          </select>
        </div>
        <div class="col-span-1 md:col-span-2">
          <label class="block text-xs font-bold text-gray-700 mb-1">ชื่อ-นามสกุล (Full Name)</label>
          <input type="text" name="name" required class="w-full border rounded p-2 text-sm bg-white">
        </div>

        <div class="col-span-1 md:col-span-2">
          <label class="block text-xs font-bold text-gray-700 mb-1">ห้อง (Class)</label>
          <input type="text" name="room" placeholder="เช่น 1" required class="w-full border rounded p-2 text-sm bg-white">
        </div>
        <div class="col-span-1 md:col-span-2">
          <label class="block text-xs font-bold text-gray-700 mb-1">ตอน (Section)</label>
          <select name="section" required class="w-full border rounded p-2 text-sm bg-white">
            <option value="ก">ก</option>
            <option value="ข">ข</option>
          </select>
        </div>
        <div class="col-span-2 md:col-span-1">
          <label class="block text-xs font-bold text-gray-700 mb-1">เลขที่ (No.)</label>
          <input type="number" name="number" min="1" required class="w-full border rounded p-2 text-sm bg-white">
        </div>
      </div>

      <h2 class="text-lg font-bold text-gray-800 mb-4 border-b pb-2">✍️ ส่วนการวิเคราะห์ข้อมูลด้วย 5W1H (5W1H Analysis)</h2>
      
      <div id="questionsContainer"></div>

      <div id="scoreBox" class="mt-6 p-4 bg-green-50 rounded-lg flex justify-between items-center border border-green-200 hidden animation-fadeIn">
        <span class="font-bold text-green-900">🎉 ส่งคำตอบเสร็จสิ้น! คะแนนรวมทั้งหมดของคุณคือ:</span>
        <span class="text-2xl font-black text-green-700" id="totalScoreDisplay">0.0 / 5</span>
      </div>

      <button type="submit" id="submitBtn" class="w-full mt-6 bg-indigo-600 hover:bg-indigo-700 text-white font-bold py-3 px-4 rounded-lg transition duration-200 cursor-pointer shadow">
        ส่งใบกิจกรรมและบันทึกคะแนน
      </button>
    </form>
  </div>

  <script>
    const WEB_APP_URL = "https://script.google.com/macros/s/AKfycbymia6RWMw81O8TIUVy5x8TwDG7Y_uVEmp-p4RtbgVAPHeB997DIRgRU9YGNaGKLZ2b/exec";

    // คลังโจทย์ 10 ชุด
    const scenarios = [
      {
        id: 1,
        th: "ในชุมชนแห่งหนึ่ง ขยะพลาสติกจากบรรจุภัณฑ์อาหารเดลิเวอรีเพิ่มขึ้นอย่างรวดเร็วในช่วงปีที่ผ่านมา ส่งผลให้ถังขยะในหมู่บ้านล้น และมีกลิ่นเหม็นรบกวนในช่วงเย็น ผู้นำชุมชนจึงต้องการหาวิธีจัดการและรณรงค์ให้ลูกบ้านลดการใช้พลาสติก หรือนำมาคัดแยกอย่างถูกวิธีเพื่อลดผลกระทบต่อสิ่งแวดล้อมและสุขภาพของคนในพื้นที่",
        en: "In a certain community, plastic waste from food delivery packaging has rapidly increased over the past year, causing village trash cans to overflow and emit a foul odor in the evening. The community leader wants to find ways to manage this issue and campaign for residents to reduce plastic use or separate waste properly to minimize environmental and health impacts on local residents.",
        keywords: {
          who: ["ผู้นำชุมชน", "ลูกบ้าน", "คนในพื้นที่", "ชุมชน", "ชาวบ้าน", "คนในหมู่บ้าน", "ผู้บริโภค", "leader", "resident", "people", "villager", "community", "citizen"],
          what: ["ขยะพลาสติก", "ขยะ", "เดลิเวอรี", "บรรจุภัณฑ์", "ล้นถัง", "กลิ่นเหม็น", "plastic", "waste", "garbage", "trash", "delivery", "packaging", "overflow", "smell", "odor"],
          where: ["หมู่บ้าน", "ชุมชน", "ในหมู่บ้าน", "ในชุมชน", "ถังขยะ", "village", "community", "neighborhood", "bin", "trash can"],
          when: ["ช่วงเย็น", "ช่วงปีที่ผ่านมา", "ปีที่แล้ว", "เวลาเย็น", "ตอนเย็น", "evening", "past year", "last year", "pm"],
          why: ["สั่งอาหาร", "เดลิเวอรี", "ไม่คัดแยก", "ใช้พลาสติก", "ขยะเพิ่ม", "order", "delivery", "sort", "separate", "use plastic", "increase"],
          how: ["จัดการ", "รณรงค์", "ลดการใช้", "คัดแยก", "แยกขยะ", "ลดพลาสติก", "manage", "campaign", "reduce", "sort", "separate", "less plastic", "recycle"]
        }
      },
      {
        id: 2,
        th: "ที่โรงเรียนมัธยมแห่งหนึ่ง นักเรียนมักจะเดินชนกันตรงหัวมุมทางขึ้นอาคารเรียน 3 ในช่วงเวลาเปลี่ยนคาบเรียนตอนพักกลางวัน เนื่องจากทางเดินแคบและไม่มีป้ายเตือน ครูฝ่ายอาคารสถานที่ต้องการหาวิธีแก้ไขปัญหานี้เพื่อลดอุบัติเหตุและการบาดเจ็บของนักเรียน",
        en: "At a high school, students often bump into each other at the corner of Building 3's staircase during class transitions at lunch break because the walkway is narrow and there are no warning signs. The school facilities teacher wants to find a solution to reduce accidents and injuries.",
        keywords: {
          who: ["นักเรียน", "ครู", "ครูฝ่ายอาคาร", "ฝ่ายอาคาร", "student", "teacher", "staff"],
          what: ["เดินชนกัน", "ชนกัน", "อุบัติเหตุ", "บาดเจ็บ", "ทางเดินแคบ", "bump", "collide", "accident", "injury", "narrow"],
          where: ["โรงเรียน", "อาคาร 3", "หัวมุม", "ทางขึ้นอาคาร", "ทางเดิน", "school", "building 3", "corner", "staircase", "walkway"],
          when: ["พักกลางวัน", "เปลี่ยนคาบ", "ช่วงเวลาเปลี่ยนคาบ", "lunch", "class transition", "break"],
          why: ["ทางเดินแคบ", "ไม่มีป้ายเตือน", "คนเยอะ", "รีบเดิน", "narrow", "no sign", "crowded", "rush"],
          how: ["ติดป้าย", "ทำลูกศร", "แบ่งเลน", "กระจายเวลา", "ขยายทาง", "sign", "arrow", "lane", "schedule", "widen"]
        }
      },
      {
        id: 3,
        th: "ร้านกาแฟสดในย่านใจกลางเมือง พบปัญหามีน้ำนมดิบเหลือทิ้งปริมาณมากจนหมดอายุทุกวันหยุดสุดสัปดาห์ (เสาร์-อาทิตย์) เนื่องจากประเมินยอดซื้อผิดพลาด ส่งผลให้ร้านมีต้นทุนที่สูญเปล่า เจ้าของร้านจึงต้องหาทางวางแผนสต็อกวัตถุดิบและจัดโปรโมชันลดการสูญเสีย",
        en: "A fresh coffee shop in the city center faces an issue with a large amount of raw milk left over and expiring every weekend (Saturday-Sunday) due to incorrect sales forecasting. This results in wasted costs, so the owner needs to find a way to manage stock and create promotions to reduce waste.",
        keywords: {
          who: ["ร้านกาแฟ", "เจ้าของร้าน", "ลูกค้า", "พนักงาน", "owner", "coffee shop", "customer"],
          what: ["นมหมดอายุ", "น้ำนมเหลือทิ้ง", "ต้นทุนสูญเปล่า", "วัตถุดิบเหลือ", "milk expired", "waste", "leftover", "cost"],
          where: ["ร้านกาแฟ", "ใจกลางเมือง", "ในร้าน", "coffee shop", "city center", "store"],
          when: ["วันหยุดสุดสัปดาห์", "เสาร์-อาทิตย์", "ทุกสัปดาห์", "weekend", "saturday", "sunday"],
          why: ["ประเมินยอดผิด", "ซื้อเยอะเกิน", "คนซื้อน้อยลง", "miscalculation", "overstock", "wrong forecast"],
          how: ["วางแผนสต็อก", "จัดโปรโมชัน", "ลดราคา", "แปรรูป", "stock management", "promotion", "discount", "forecast"]
        }
      },
      {
        id: 4,
        th: "เกษตรกรผู้ปลูกทุเรียนในจังหวัดจันทบุรี ประสบปัญหาผลผลิตเสียหายจากโรครากเน่าโคนเน่าในช่วงฤดูฝน (มิถุนายน - สิงหาคม) ทำให้ทุเรียนยืนต้นตายและสูญเสียรายได้ เกษตรกรจึงต้องการระบบเตือนภัยความชื้นในดินและวิธีบำรุงรักษาหน้าดินที่ถูกต้อง",
        en: "Durian farmers in Chanthaburi experience crop damage from root rot disease during the rainy season (June - August), causing durian trees to die and losing income. Farmers need a soil moisture warning system and proper topsoil maintenance methods.",
        keywords: {
          who: ["เกษตรกร", "ชาวสวน", "ผู้ปลูกทุเรียน", "farmer", "grower"],
          what: ["โรครากเน่า", "ทุเรียนตาย", "เสียหาย", "สูญเสียรายได้", "root rot", "damage", "tree die", "loss of income"],
          where: ["จันทบุรี", "สวนทุเรียน", "ในสวน", "ดิน", "chanthaburi", "orchard", "farm", "soil"],
          when: ["ฤดูฝน", "มิถุนายน", "สิงหาคม", "ช่วงฝนตก", "rainy season", "june", "august", "rain"],
          why: ["ความชื้นสูง", "ฝนตกหนัก", "น้ำขัง", "เชื้อรา", "high moisture", "heavy rain", "flooding", "fungus"],
          how: ["ระบบเตือนภัย", "บำรุงหน้าดิน", "ระบายน้ำ", "ใช้ยาฆ่าเชื้อรา", "warning system", "drainage", "soil care", "fungicide"]
        }
      },
      {
        id: 5,
        th: "ผู้สูงอายุในคอนโดมิเนียมแห่งหนึ่ง มักลืมกินยาโรคประจำตัวในช่วงเช้าหลังตื่นนอน เนื่องจากขวดยามีขนาดเล็กและตัวหนังสือบนฉลากลางเลือน บุตรหลานและนิติบุคคลจึงต้องการออกแบบกล่องยาอัจฉริยะหรือระบบแจ้งเตือนเพื่อความปลอดภัย",
        en: "Elderly residents in a condominium often forget to take their daily medication in the morning after waking up because the medicine bottles are small and the labels are faded. Relatives and the condo management want to design a smart pillbox or notification system.",
        keywords: {
          who: ["ผู้สูงอายุ", "คนแก่", "บุตรหลาน", "นิติบุคคล", "elderly", "senior", "relative", "management"],
          what: ["ลืมกินยา", "ฉลากเลือน", "อันตราย", "forget medication", "faded label", "forget medicine"],
          where: ["คอนโดมิเนียม", "คอนโด", "ห้องพัก", "condominium", "condo", "room"],
          when: ["ช่วงเช้า", "หลังตื่นนอน", "ตอนเช้า", "morning", "after waking up"],
          why: ["ขวดยาเล็ก", "ตัวหนังสือเลือน", "ความจำเสื่อม", "small bottle", "faded text", "forgetful"],
          how: ["กล่องยาอัจฉริยะ", "ระบบแจ้งเตือน", "ขยายตัวหนังสือ", "smart pillbox", "reminder", "alarm", "app"]
        }
      },
      {
        id: 6,
        th: "พนักงานออฟฟิศในย่านธุรกิจ มีอาการออฟฟิศซินโดรม ปวดหลังและบ่าอย่างรุนแรงในช่วงปลายสัปดาห์ เนื่องจากต้องนั่งทำงานติดต่อกันเกิน 4 ชั่วโมงต่อวันโดยไม่เปลี่ยนอิริยาบถ ฝ่ายบุคคลจึงอยากจัดกิจกรรมปรับยืดกล้ามเนื้อและปรับสรีระโต๊ะทำงาน",
        en: "Office workers in a business district suffer from office syndrome, experiencing severe back and shoulder pain by the end of the week because they sit for more than 4 consecutive hours a day without moving. HR wants to organize stretching activities and ergonomic workspace adjustments.",
        keywords: {
          who: ["พนักงานออฟฟิศ", "พนักงาน", "ฝ่ายบุคคล", "hr", "office worker", "employee", "human resources"],
          what: ["ออฟฟิศซินโดรม", "ปวดหลัง", "ปวดบ่า", "ปวดเมื่อย", "office syndrome", "back pain", "shoulder pain"],
          where: ["ออฟฟิศ", "ที่ทำงาน", "ย่านธุรกิจ", "โต๊ะทำงาน", "office", "workplace", "desk"],
          when: ["ปลายสัปดาห์", "ทำงานเกิน 4 ชั่วโมง", "ระหว่างวัน", "end of the week", "4 hours", "during work"],
          why: ["นั่งนานเกินไป", "ไม่เปลี่ยนอิริยาบถ", "โต๊ะไม่ถูกสรีระ", "sitting too long", "no movement", "bad posture"],
          how: ["จัดกิจกรรมยืดเส้น", "ปรับโต๊ะทำงาน", "ยืดกล้ามเนื้อ", "stretching", "ergonomic", "adjust desk", "break"]
        }
      },
      {
        id: 7,
        th: "ห้องสมุดประชาชนประจำจังหวัด มีจำนวนผู้เข้าใช้บริการลดลงกว่า 50% ในกลุ่มเด็กและเยาวชนช่วงปิดเทอมฤดูร้อน เนื่องจากหนังสือเก่าและขาดสื่อการเรียนรู้รูปสื่อดิจิทัล คณะกรรมการห้องสมุดจึงต้องปรับปรุงพื้นที่และเพิ่ม e-book",
        en: "The provincial public library has seen a dynamic 50% decrease in child and youth visitors during the summer break because the books are outdated and there is a lack of digital media. The library committee needs to renovate the space and add e-books.",
        keywords: {
          who: ["เด็ก", "เยาวชน", "ผู้ใช้บริการ", "คณะกรรมการห้องสมุด", "children", "youth", "visitor", "committee"],
          what: ["ผู้ใช้บริการลดลง", "คนเข้าน้อยลง", "หนังสือเก่า", "ขาดสื่อดิจิทัล", "fewer visitors", "outdated books", "lack of digital"],
          where: ["ห้องสมุดประชาชน", "ห้องสมุด", "library", "public library"],
          when: ["ช่วงปิดเทอม", "ฤดูร้อน", "ปิดเทอมหน้าร้อน", "summer break", "vacation"],
          why: ["หนังสือเก่า", "ไม่มีสื่อดิจิทัล", "น่าเบื่อ", "old books", "no digital media", "boring"],
          how: ["ปรับปรุงพื้นที่", "เพิ่ม e-book", "สื่อดิจิทัล", "จัดกิจกรรมใหม่", "renovate", "add e-book", "digital media"]
        }
      },
      {
        id: 8,
        th: "กลุ่มแม่บ้านในหมู่บ้านห่างไกล ขาดรายได้เสริมในช่วงหลังฤดูแล้ง (มีนาคม-พฤษภาคม) หลังเสร็จสิ้นฤดูกาลเก็บเกี่ยว เนื่องจากไม่มีอาชีพทดแทน ประธานกลุ่มต้องการรณรงค์ให้หันมาแปรรูปผลิตภัณฑ์จากพืชท้องถิ่นเพื่อจำหน่ายออนไลน์",
        en: "Housewife groups in a remote village lack supplementary income during the dry season (March - May) after the harvest ends because there are no alternative jobs. The group leader wants to campaign for processing local plant products to sell online.",
        keywords: {
          who: ["กลุ่มแม่บ้าน", "แม่บ้าน", "ประธานกลุ่ม", "ชาวบ้าน", "housewife", "women group", "leader"],
          what: ["ขาดรายได้เสริม", "ไม่มีงานทำ", "ขาดรายได้", "lack of income", "no job", "unemployment"],
          where: ["หมู่บ้านห่างไกล", "หมู่บ้าน", "ชุมชน", "ในหมู่บ้าน", "remote village", "rural area", "community"],
          when: ["หลังฤดูแล้ง", "มีนาคม", "พฤษภาคม", "หลังเก็บเกี่ยว", "dry season", "march", "may", "post-harvest"],
          why: ["เสร็จสิ้นเก็บเกี่ยว", "ไม่มีอาชีพทดแทน", "ฝนไม่ตก", "harvest ends", "no alternative job", "drought"],
          how: ["แปรรูปผลิตภัณฑ์", "พืชท้องถิ่น", "จำหน่ายออนไลน์", "ขายออนไลน์", "food processing", "local product", "online sale"]
        }
      },
      {
        id: 9,
        th: "ในตลาดสดชุมชน พ่อค้าแม่ค้าประสบปัญหาหนูกัดแทะสายไฟและทำลายสินค้าประเภทข้าวสารแห้งในช่วงกลางคืนหลังจากตลาดปิด ส่งผลให้เสี่ยงไฟไหม้และสินค้าเสียหายอย่างมาก หัวหน้าตลาดจึงต้องหาวิธีดักจับและทำความสะอาดครั้งใหญ่",
        en: "In a local fresh market, vendors face an issue with rats biting electrical wires and damaging dry rice goods at night after the market closes. This risks fires and causes major inventory damage, so the market manager needs to find trapping and big-cleaning methods.",
        keywords: {
          who: ["พ่อค้าแม่ค้า", "หัวหน้าตลาด", "เจ้าของร้าน", "หนู", "vendor", "merchant", "manager", "rat"],
          what: ["หนูกัดสายไฟ", "สินค้าเสียหาย", "เสี่ยงไฟไหม้", "หนูทำลายสินค้า", "rat bite", "damage", "fire risk", "pest"],
          where: ["ตลาดสด", "ตลาด", "ในตลาด", "market", "fresh market"],
          when: ["ช่วงกลางคืน", "หลังจากตลาดปิด", "ตอนกลางคืน", "night", "after closing"],
          why: ["ตลาดสกปรก", "มีเศษอาหาร", "หนูชุกชุม", "dirty market", "food scraps", "rats infestation"],
          how: ["ดักจับหนู", "ทำความสะอาดครั้งใหญ่", "บิ๊กคลีนนิ่ง", "เก็บของมิดชิด", "pest control", "trapping", "big cleaning", "clean up"]
        }
      },
      {
        id: 10,
        th: "ผู้ใช้รถใช้ถนนบริเวณสี่แยกกลางเมือง มักขับรถฝ่าสัญญาณไฟจราจรในช่วงเวลากลางคืนหลังเที่ยงคืน (00:00 - 04:00 น.) ทำให้เกิดอุบัติเหตุรุนแรงบ่อยครั้ง ตำรวจจราจรในพื้นที่จึงต้องการติดตั้งระบบกล้องจับความเร็วและไฟสัญญาณแบบอัตโนมัติ",
        en: "Commuters at a city center intersection often run red lights at night after midnight (00:00 - 04:00 AM), causing frequent severe accidents. Local traffic police want to install speed cameras and an automated traffic light system.",
        keywords: {
          who: ["ผู้ใช้รถใช้ถนน", "คนขับรถ", "鐵路", "ตำรวจจราจร", "ตำรวจ", "commuter", "driver", "traffic police", "officer"],
          what: ["ฝ่าสัญญาณไฟ", "ฝ่าไฟแดง", "อุบัติเหตุรุนแรง", "run red light", "accident", "crash"],
          where: ["สี่แยกกลางเมือง", "สี่แยก", "ถนนกลางเมือง", "intersection", "crossroad", "junction"],
          when: ["เวลากลางคืน", "หลังเที่ยงคืน", "00:00", "04:00", "night", "midnight", "am"],
          why: ["ถนนโล่ง", "ไม่มีตำรวจ", "ประมาท", "empty road", "no police", "carelessness", "reckless"],
          how: ["ติดตั้งกล้อง", "กล้องจับความเร็ว", "ไฟสัญญาณอัตโนมัติ", "ปรับเงิน", "install camera", "speed camera", "automated light"]
        }
      }
    ];

    let currentScenario = {};
    let aiKeywords = {};
    const container = document.getElementById('questionsContainer');
    let scores = { who: 0, what: 0, where: 0, when: 0, why: 0, how: 0 };

    function initScenario() {
      const randomIndex = Math.floor(Math.random() * scenarios.length);
      currentScenario = scenarios[randomIndex];
      
      document.getElementById('scenarioTextContent').firstChild.textContent = ` "${currentScenario.th}" `;
      document.getElementById('scenarioTextEn').innerText = `"${currentScenario.en}"`;
      
      document.getElementById('scenarioIdInput').value = currentScenario.id;
      aiKeywords = currentScenario.keywords;
    }

    const qList = [
      { id: 'who', title: '1. Who (ใคร)', desc: 'ใครคือบุคคลที่เกี่ยวข้องกับปัญหานี้ หรือใครได้รับผลกระทบ?<br><span class="italic text-[11px] text-gray-400">Who is involved in or affected by this problem?</span>' },
      { id: 'what', title: '2. What (อะไร)', desc: 'ปัญหานี้คืออะไร เกิดอะไรขึ้นจากสถานการณ์ที่กำหนด?<br><span class="italic text-[11px] text-gray-400">What is the problem? What happened in the given scenario?</span>' },
      { id: 'where', title: '3. Where (ที่ไหน)', desc: 'เหตุการณ์หรือปัญหานี้เกิดขึ้นที่สถานที่ใด?<br><span class="italic text-[11px] text-gray-400">Where did this event or problem occur?</span>' },
      { id: 'when', title: '4. When (เมื่อไหร่)', desc: 'ปัญหานี้เกิดขึ้นตอนไหน หรือช่วงเวลาใด?<br><span class="italic text-[11px] text-gray-400">When did this problem occur? At what period or time?</span>' },
      { id: 'why', title: '5. Why (ทำไม)', desc: 'ทำไมจึงเกิดปัญหานี้ขึ้น สาเหตุหลักมาจากอะไร?<br><span class="italic text-[11px] text-gray-400">Why did this problem happen? What is the root cause?</span>' },
      { id: 'how', title: '6. How (อย่างไร)', desc: 'จะมีแนวทางหรือวิธีการแก้ไขปัญหานี้ได้อย่างไรบ้าง?<br><span class="italic text-[11px] text-gray-400">How can this problem be solved or managed? What are the solutions?</span>' }
    ];

    qList.forEach(q => {
      const div = document.createElement('div');
      div.className = "mb-6 p-4 border border-gray-200 rounded-lg bg-white shadow-sm transition-all duration-200";
      div.id = `box_${q.id}`;
      div.innerHTML = `
        <div class="flex justify-between items-center mb-1">
          <label class="block font-bold text-gray-800">${q.title}</label>
          <span id="warning_${q.id}" class="text-xs font-bold text-red-500 hidden">⚠️ ห้ามคัดลอกข้อความมาวาง! ต้องพิมพ์ตอบเองเท่านั้น (No Pasting!)</span>
        </div>
        <p class="text-xs text-gray-500 mb-2">${q.desc}</p>
        
        <textarea id="input_${q.id}" name="ans_${q.id}" rows="2" 
          class="w-full border rounded p-2 text-sm focus:ring-2 focus:ring-indigo-400 focus:outline-none transition-colors" 
          placeholder="พิมพ์คำตอบของคุณที่นี่... (Type your answer here...)" 
          oninput="instantLiveCheck('${q.id}')" 
          onpaste="preventPaste(event, '${q.id}')"
          oncontextmenu="return false;"
          required></textarea>
        
        <div class="mt-2 flex items-center justify-between text-xs">
          <div class="flex items-center gap-2 w-full">
            <span class="text-gray-500 font-medium whitespace-nowrap">ความตรงประเด็น (Relevance):</span>
            <div class="w-full bg-gray-200 rounded-full h-2">
              <div id="progress_${q.id}" class="bg-green-500 h-2 rounded-full transition-all duration-300" style="width: 0%"></div>
            </div>
            <span id="percent_${q.id}" class="font-bold text-green-600 min-w-[35px] text-right">0%</span>
          </div>
        </div>
      `;
      container.appendChild(div);
    });

    initScenario();

    function preventPaste(e, qId) {
      e.preventDefault(); 
      const box = document.getElementById(`box_${qId}`);
      const input = document.getElementById(`input_${qId}`);
      const warning = document.getElementById(`warning_${qId}`);
      
      input.classList.add('border-red-500', 'bg-red-50');
      warning.classList.remove('hidden');
      box.classList.add('shake', 'border-red-300');
      
      setTimeout(() => {
        input.classList.remove('border-red-500', 'bg-red-50');
        warning.classList.add('hidden');
        box.classList.remove('shake', 'border-red-300');
      }, 1500);
      
      return false;
    }

    function instantLiveCheck(qId) {
      const studentAnswer = document.getElementById(`input_${qId}`).value;
      
      if (!studentAnswer || studentAnswer.trim() === "") {
        scores[qId] = 0;
        updateUI(qId, 0);
        return;
      }

      let text = studentAnswer.toLowerCase();
      let matchCount = 0;
      let keywords = aiKeywords[qId];
      
      keywords.forEach(word => {
        if (text.includes(word.toLowerCase())) matchCount++;
      });
      
      let finalPercent = 0;
      if (matchCount === 1) {
        finalPercent = 50;
      } else if (matchCount >= 2) {
        finalPercent = 100;
      }
      
      scores[qId] = finalPercent / 100;
      updateUI(qId, finalPercent);
    }

    function updateUI(qId, percent) {
      document.getElementById(`progress_${qId}`).style.width = percent + '%';
      document.getElementById(`percent_${qId}`).innerText = percent + '%';
    }

    function calculateFinalScore() {
      let totalRaw = Object.values(scores).reduce((a, b) => a + b, 0);
      let calculatedScore = (totalRaw / 6) * 5;
      return parseFloat(calculatedScore.toFixed(1));
    }

    function displayFinalScore() {
      let finalScore = calculateFinalScore();
      document.getElementById('totalScoreDisplay').innerText = finalScore.toFixed(1) + " / 5";
      
      const scoreBox = document.getElementById('scoreBox');
      scoreBox.classList.remove('hidden');
      scoreBox.scrollIntoView({ behavior: 'smooth' });
    }

    function handleFormSubmit(e) {
      e.preventDefault();
      const btn = document.getElementById('submitBtn');
      
      btn.disabled = true;
      btn.className = "w-full mt-6 bg-gray-400 text-white font-bold py-3 px-4 rounded-lg cursor-not-allowed";
      btn.innerText = "กำลังส่งข้อมูลออนไลน์ไปยัง Google Sheets...";

      let finalTotalScore = calculateFinalScore();
      const form = document.getElementById('activityForm');

      const formDataObj = {
        scenario_id: form.scenario_id.value,
        prefix: form.prefix.value,
        name: form.name.value,
        studentId: form.studentId.value,
        room: form.room.value,
        section: form.section.value,
        number: form.number.value,
        
        ans_who: document.getElementById('input_who').value,
        ans_what: document.getElementById('input_what').value,
        ans_where: document.getElementById('input_where').value,
        ans_when: document.getElementById('input_when').value,
        ans_why: document.getElementById('input_why').value,
        ans_how: document.getElementById('input_how').value,

        score_who: parseFloat((scores.who * (5 / 6)).toFixed(2)),
        score_what: parseFloat((scores.what * (5 / 6)).toFixed(2)),
        score_where: parseFloat((scores.where * (5 / 6)).toFixed(2)),
        score_when: parseFloat((scores.when * (5 / 6)).toFixed(2)),
        score_why: parseFloat((scores.why * (5 / 6)).toFixed(2)),
        score_how: parseFloat((scores.how * (5 / 6)).toFixed(2)),
        total_score: finalTotalScore
      };

      fetch(WEB_APP_URL, {
        method: "POST",
        mode: "no-cors", 
        cache: "no-cache",
        headers: {
          "Content-Type": "application/json",
        },
        body: JSON.stringify(formDataObj)
      })
      .then(response => {
        alert("ส่งใบกิจกรรมสำเร็จ! คะแนนถูกจัดเก็บเรียบร้อยแล้ว 🚀");
        displayFinalScore();
        
        btn.disabled = false;
        btn.className = "w-full mt-6 bg-amber-500 hover:bg-amber-600 text-white font-bold py-3 px-4 rounded-lg transition duration-200 cursor-pointer shadow-md";
        btn.innerText = "🔄 แก้ไขคำตอบและส่งใหม่อีกครั้ง (Resubmit)";
      })
      .catch(error => {
        alert("เกิดข้อผิดพลาดในการเชื่อมต่อเซิร์ฟเวอร์: " + error.message);
        btn.disabled = false;
        btn.className = "w-full mt-6 bg-indigo-600 hover:bg-indigo-700 text-white font-bold py-3 px-4 rounded-lg transition duration-200 cursor-pointer";
        btn.innerText = "ลองส่งข้อมูลอีกครั้ง";
      });
    }
  </script>
</body>
</html>
